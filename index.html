<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Atharva Capital | Professional Crypto Terminal</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: -apple-system, 'Segoe UI', 'Inter', monospace;
            height: 100vh;
            overflow: hidden;
        }

        .terminal {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #0a0a0a;
        }

        /* Top Bar */
        .top-bar {
            background: #0d0d0d;
            border-bottom: 1px solid #1f1f1f;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #00ff88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-sub {
            font-size: 9px;
            color: #444;
            margin-left: 5px;
        }

        .search-container {
            position: relative;
            width: 280px;
        }

        .search-input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 8px 12px;
            color: #fff;
            font-size: 13px;
        }

        .search-input:focus {
            outline: none;
            border-color: #00ff88;
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .search-results.show {
            display: block;
        }

        .search-result-item {
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid #2a2a2a;
        }

        .search-result-item:hover {
            background: #2a2a2a;
        }

        .user-info {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .balance {
            background: #1a1a1a;
            padding: 6px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
        }

        .topup-btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .auth-btn {
            background: #2a2a2a;
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Main Layout */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 1px;
            background: #1a1a1a;
        }

        /* Left Panel */
        .left-panel {
            width: 260px;
            background: #0d0d0d;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .panel-header {
            padding: 12px 15px;
            border-bottom: 1px solid #1f1f1f;
        }

        .panel-header h3 {
            font-size: 11px;
            color: #666;
            letter-spacing: 1px;
        }

        .watchlist-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #111;
        }

        .watchlist-item:hover {
            background: #141414;
        }

        .watchlist-item.active {
            background: #1a2a1a;
            border-left: 2px solid #00ff88;
        }

        .positive { color: #00ff88; }
        .negative { color: #ff3355; }

        /* Center Panel */
        .center-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            min-width: 0;
        }

        .chart-header {
            padding: 8px 15px;
            border-bottom: 1px solid #1f1f1f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .current-symbol {
            font-size: 18px;
            font-weight: 600;
        }

        .current-price {
            font-size: 22px;
            font-family: monospace;
            margin-left: 12px;
        }

        .timeframes {
            display: flex;
            gap: 4px;
        }

        .tf-btn {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #888;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }

        .tf-btn.active {
            background: #00ff88;
            color: #000;
            border-color: #00ff88;
        }

        .indicator-dropdown {
            position: relative;
        }

        .indicator-btn {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #fff;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .indicator-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            width: 220px;
            display: none;
            z-index: 100;
        }

        .indicator-menu.show {
            display: block;
        }

        .indicator-search {
            padding: 8px;
            border-bottom: 1px solid #2a2a2a;
        }

        .indicator-search input {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            padding: 6px;
            border-radius: 4px;
            color: #fff;
        }

        .indicator-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .indicator-option {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
        }

        .indicator-option:hover {
            background: #2a2a2a;
        }

        .chart-container {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        #chart {
            width: 100%;
            height: 100%;
            min-height: 400px;
        }

        /* Right Panel */
        .right-panel {
            width: 320px;
            background: #0d0d0d;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .trade-tabs {
            display: flex;
            padding: 12px;
            gap: 8px;
        }

        .trade-tab {
            flex: 1;
            padding: 10px;
            background: #1a1a1a;
            border: none;
            color: #888;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .trade-tab.active {
            background: #00ff88;
            color: #000;
        }

        .trade-tab.sell.active {
            background: #ff3355;
            color: #fff;
        }

        .trade-form {
            padding: 12px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 10px;
            color: #666;
            margin-bottom: 4px;
        }

        .input-group input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            padding: 10px;
            border-radius: 6px;
            color: #fff;
            font-family: monospace;
        }

        .execute-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
        }

        .execute-btn.buy {
            background: #00ff88;
            color: #000;
        }

        .execute-btn.sell {
            background: #ff3355;
            color: #fff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding: 12px;
            border-top: 1px solid #1f1f1f;
        }

        .stat-card {
            background: #141414;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 9px;
            color: #666;
        }

        .stat-value {
            font-size: 14px;
            font-weight: 600;
        }

        .section {
            padding: 12px;
            border-top: 1px solid #1f1f1f;
        }

        .section-title {
            font-size: 10px;
            color: #666;
            margin-bottom: 8px;
        }

        .position-item, .history-item {
            background: #141414;
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 6px;
        }

        .position-row, .history-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }

        .status-bar {
            background: #0d0d0d;
            border-top: 1px solid #1f1f1f;
            padding: 5px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #555;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
        }

        .emotion-buttons {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .emotion-btn {
            background: #2a2a2a;
            border: none;
            padding: 10px;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="terminal" id="app">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
            <div style="text-align: center;">
                <div style="font-size: 24px; margin-bottom: 10px;">🚀 Loading Atharva Capital...</div>
                <div style="width: 40px; height: 40px; border: 2px solid #1a1a1a; border-top-color: #00ff88; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
            </div>
        </div>
    </div>

    <script>
        // ============ FIREBASE CONFIG (REPLACE WITH YOURS) ============
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        let db, auth;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            auth = firebase.auth();
        } catch(e) {
            console.warn('Firebase not configured, using local storage only');
        }

        // ============ GLOBAL STATE ============
        let currentUser = null;
        let userData = {
            balance: 10000,
            positions: [],
            tradeHistory: [],
            emotions: []
        };
        
        let selectedCoin = 'BTCUSDT';
        let selectedCoinName = 'BTC';
        let currentPrice = 0;
        let currentChange24h = 0;
        let marketPrices = {};
        let allCoins = [];
        let chart = null;
        let candlestickSeries = null;
        let currentInterval = '1h';
        let activeIndicators = [];
        let chartInitialized = false;
        
        // ============ LOAD ALL COINS ============
        async function loadAllCoins() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/exchangeInfo');
                const data = await response.json();
                allCoins = data.symbols
                    .filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING')
                    .map(s => ({ symbol: s.symbol, baseAsset: s.baseAsset }))
                    .slice(0, 500);
                return allCoins;
            } catch(e) {
                console.error('Error loading coins:', e);
                return [];
            }
        }
        
        // ============ SEARCH COINS ============
        function searchCoins(query) {
            if (!query || query.length < 2) return [];
            return allCoins
                .filter(coin => coin.symbol.toLowerCase().includes(query.toLowerCase()))
                .slice(0, 15);
        }
        
        // ============ FETCH LIVE PRICES ============
        async function fetchPrices() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const data = await response.json();
                data.forEach(item => {
                    marketPrices[item.symbol] = {
                        price: parseFloat(item.lastPrice),
                        change: parseFloat(item.priceChangePercent),
                        high: parseFloat(item.highPrice),
                        low: parseFloat(item.lowPrice),
                        volume: parseFloat(item.volume)
                    };
                });
                if (marketPrices[selectedCoin]) {
                    currentPrice = marketPrices[selectedCoin].price;
                    currentChange24h = marketPrices[selectedCoin].change;
                }
                updatePriceDisplay();
                return marketPrices;
            } catch(e) {
                console.error('Price fetch error:', e);
            }
        }
        
        function updatePriceDisplay() {
            const priceEl = document.getElementById('currentPriceDisplay');
            const changeEl = document.getElementById('currentChangeDisplay');
            if (priceEl) priceEl.innerText = `$${currentPrice?.toLocaleString() || '—'}`;
            if (changeEl) {
                changeEl.innerText = `${currentChange24h >= 0 ? '+' : ''}${currentChange24h?.toFixed(2) || '0'}%`;
                changeEl.className = currentChange24h >= 0 ? 'positive' : 'negative';
            }
        }
        
        // ============ FETCH CHART DATA ============
        async function fetchChartData() {
            try {
                const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${selectedCoin}&interval=${currentInterval}&limit=200`);
                const data = await response.json();
                const chartData = data.map(k => ({
                    time: k[0] / 1000,
                    open: parseFloat(k[1]),
                    high: parseFloat(k[2]),
                    low: parseFloat(k[3]),
                    close: parseFloat(k[4])
                }));
                
                if (candlestickSeries && chartData.length > 0) {
                    candlestickSeries.setData(chartData);
                    chart?.timeScale().fitContent();
                }
                return chartData;
            } catch(e) {
                console.error('Chart data error:', e);
            }
        }
        
        // ============ INITIALIZE CHART ============
        async function initChart() {
            const container = document.getElementById('chart');
            if (!container) {
                console.log('Chart container not found');
                return false;
            }
            
            // Wait for library to be available
            if (typeof LightweightCharts === 'undefined') {
                console.log('Waiting for LightweightCharts...');
                setTimeout(initChart, 500);
                return false;
            }
            
            try {
                chart = LightweightCharts.createChart(container, {
                    layout: { background: { color: '#0a0a0a' }, textColor: '#888888' },
                    grid: { vertLines: { color: '#1a1a1a' }, horzLines: { color: '#1a1a1a' } },
                    crosshair: { mode: 0, vertLine: { color: '#333', width: 1, style: 2 }, horzLine: { color: '#333', width: 1, style: 2 } },
                    rightPriceScale: { borderColor: '#2a2a2a', textColor: '#888' },
                    timeScale: { borderColor: '#2a2a2a', textColor: '#888', timeVisible: true, secondsVisible: false },
                    width: container.clientWidth,
                    height: 450
                });
                
                candlestickSeries = chart.addCandlestickSeries({
                    upColor: '#00ff88',
                    downColor: '#ff3355',
                    borderUpColor: '#00ff88',
                    borderDownColor: '#ff3355',
                    wickUpColor: '#00ff88',
                    wickDownColor: '#ff3355'
                });
                
                window.addEventListener('resize', () => {
                    if (chart && container) {
                        chart.applyOptions({ width: container.clientWidth });
                    }
                });
                
                await fetchChartData();
                chartInitialized = true;
                return true;
            } catch(e) {
                console.error('Chart init error:', e);
                return false;
            }
        }
        
        // ============ ADD INDICATOR ============
        async function addIndicator(indicatorName) {
            if (!chart) return;
            
            try {
                switch(indicatorName) {
                    case 'RSI':
                        const rsiData = await calculateRSI();
                        if (rsiData) {
                            const rsiSeries = chart.addLineSeries({ color: '#aa00ff', lineWidth: 1, title: 'RSI' });
                            rsiSeries.setData(rsiData);
                        }
                        break;
                    case 'EMA 9':
                        const ema9Data = await calculateEMA(9);
                        if (ema9Data) {
                            const ema9Series = chart.addLineSeries({ color: '#00aaff', lineWidth: 1, title: 'EMA 9' });
                            ema9Series.setData(ema9Data);
                        }
                        break;
                    case 'EMA 20':
                        const ema20Data = await calculateEMA(20);
                        if (ema20Data) {
                            const ema20Series = chart.addLineSeries({ color: '#ffaa00', lineWidth: 1, title: 'EMA 20' });
                            ema20Series.setData(ema20Data);
                        }
                        break;
                    case 'EMA 50':
                        const ema50Data = await calculateEMA(50);
                        if (ema50Data) {
                            const ema50Series = chart.addLineSeries({ color: '#ff66cc', lineWidth: 1, title: 'EMA 50' });
                            ema50Series.setData(ema50Data);
                        }
                        break;
                }
                
                if (!activeIndicators.includes(indicatorName)) {
                    activeIndicators.push(indicatorName);
                }
            } catch(e) {
                console.error('Indicator error:', e);
            }
        }
        
        async function calculateEMA(period) {
            const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${selectedCoin}&interval=${currentInterval}&limit=200`);
            const data = await response.json();
            const closes = data.map(k => parseFloat(k[4]));
            
            let k = 2 / (period + 1);
            let ema = [closes[0]];
            for (let i = 1; i < closes.length; i++) {
                ema.push(closes[i] * k + ema[i-1] * (1 - k));
            }
            
            return data.map((k, i) => ({
                time: k[0] / 1000,
                value: ema[i]
            }));
        }
        
        async function calculateRSI(period = 14) {
            const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${selectedCoin}&interval=${currentInterval}&limit=200`);
            const data = await response.json();
            const closes = data.map(k => parseFloat(k[4]));
            
            let gains = 0, losses = 0;
            for (let i = 1; i <= period; i++) {
                let diff = closes[i] - closes[i-1];
                if (diff >= 0) gains += diff;
                else losses -= diff;
            }
            
            let avgGain = gains / period;
            let avgLoss = losses / period;
            let rs = avgGain / avgLoss;
            let rsi = 100 - (100 / (1 + rs));
            
            return data.slice(period).map((k, i) => ({
                time: k[0] / 1000,
                value: rsi
            }));
        }
        
        // ============ EXECUTE TRADE ============
        async function executeTrade(side) {
            const amount = parseFloat(document.getElementById('tradeAmount')?.value || 0);
            const sl = parseFloat(document.getElementById('stopLoss')?.value || 0);
            const tp = parseFloat(document.getElementById('takeProfit')?.value || 0);
            
            if (!amount || amount <= 0) {
                alert('Enter valid amount');
                return;
            }
            
            const totalCost = amount * currentPrice;
            
            if (side === 'buy') {
                if (totalCost > userData.balance) {
                    alert(`Insufficient balance! Available: $${userData.balance.toFixed(2)}`);
                    return;
                }
                
                userData.positions.push({
                    id: Date.now(),
                    coin: selectedCoin,
                    coinName: selectedCoinName,
                    amount: amount,
                    entryPrice: currentPrice,
                    stopLoss: sl || null,
                    takeProfit: tp || null,
                    timestamp: new Date().toISOString()
                });
                userData.balance -= totalCost;
            } else {
                const position = userData.positions.find(p => p.coin === selectedCoin);
                if (!position) {
                    alert('No position to sell');
                    return;
                }
                
                const pnl = (currentPrice - position.entryPrice) * position.amount;
                userData.tradeHistory.unshift({
                    id: Date.now(),
                    coin: selectedCoin,
                    coinName: selectedCoinName,
                    entryPrice: position.entryPrice,
                    exitPrice: currentPrice,
                    amount: position.amount,
                    pnl: pnl,
                    timestamp: new Date().toISOString()
                });
                userData.balance += position.amount * currentPrice;
                userData.positions = userData.positions.filter(p => p.id !== position.id);
                
                showEmotionModal();
            }
            
            await saveUserData();
            renderRightPanel();
            
            document.getElementById('tradeAmount').value = '';
            document.getElementById('stopLoss').value = '';
            document.getElementById('takeProfit').value = '';
        }
        
        function showEmotionModal() {
            const modal = document.getElementById('emotionModal');
            if (modal) modal.classList.add('show');
        }
        
        async function submitEmotion(emotion) {
            userData.emotions.push({ emotion, timestamp: new Date().toISOString() });
            await saveUserData();
            document.getElementById('emotionModal')?.classList.remove('show');
        }
        
        async function topUpBalance() {
            userData.balance += 1000;
            await saveUserData();
            renderRightPanel();
        }
        
        // ============ FIREBASE ============
        async function saveUserData() {
            if (!currentUser || !db) return;
            await db.collection('users').doc(currentUser.uid).set({
                balance: userData.balance,
                positions: userData.positions,
                tradeHistory: userData.tradeHistory,
                emotions: userData.emotions,
                updatedAt: new Date().toISOString()
            }, { merge: true });
        }
        
        async function loadUserData(uid) {
            if (!db) return;
            const doc = await db.collection('users').doc(uid).get();
            if (doc.exists) {
                const data = doc.data();
                userData.balance = data.balance || 10000;
                userData.positions = data.positions || [];
                userData.tradeHistory = data.tradeHistory || [];
                userData.emotions = data.emotions || [];
            } else {
                userData = { balance: 10000, positions: [], tradeHistory: [], emotions: [] };
            }
        }
        
        // ============ AUTH ============
        async function login(email, password) {
            if (!auth) { alert('Firebase not configured'); return; }
            try {
                await auth.signInWithEmailAndPassword(email, password);
                currentUser = auth.currentUser;
                await loadUserData(currentUser.uid);
                renderUI();
            } catch(e) {
                alert('Login failed: ' + e.message);
            }
        }
        
        async function signup(email, password) {
            if (!auth) { alert('Firebase not configured'); return; }
            try {
                await auth.createUserWithEmailAndPassword(email, password);
                currentUser = auth.currentUser;
                await saveUserData();
                renderUI();
            } catch(e) {
                alert('Signup failed: ' + e.message);
            }
        }
        
        function logout() {
            auth?.signOut();
            currentUser = null;
            userData = { balance: 10000, positions: [], tradeHistory: [], emotions: [] };
            renderUI();
        }
        
        // ============ STATS ============
        function calculateStats() {
            const trades = userData.tradeHistory;
            const winningTrades = trades.filter(t => t.pnl > 0);
            const totalPnL = trades.reduce((sum, t) => sum + t.pnl, 0);
            const winRate = trades.length > 0 ? (winningTrades.length / trades.length * 100) : 0;
            const bestTrade = trades.length > 0 ? Math.max(...trades.map(t => t.pnl)) : 0;
            const worstTrade = trades.length > 0 ? Math.min(...trades.map(t => t.pnl)) : 0;
            return { totalPnL, winRate, bestTrade, worstTrade, totalTrades: trades.length };
        }
        
        // ============ RENDER FUNCTIONS ============
        function renderWatchlist() {
            const container = document.getElementById('watchlistContainer');
            if (!container) return;
            
            const topCoins = Object.keys(marketPrices).slice(0, 30);
            container.innerHTML = topCoins.map(symbol => `
                <div class="watchlist-item ${selectedCoin === symbol ? 'active' : ''}" onclick="selectCoin('${symbol}')">
                    <div>
                        <div style="font-weight:500;">${symbol.replace('USDT', '')}</div>
                        <div style="font-size:9px; color:#555;">${symbol}</div>
                    </div>
                    <div style="text-align:right">
                        <div>$${marketPrices[symbol]?.price?.toLocaleString() || '—'}</div>
                        <div class="${marketPrices[symbol]?.change >= 0 ? 'positive' : 'negative'}" style="font-size:10px;">
                            ${marketPrices[symbol]?.change >= 0 ? '+' : ''}${marketPrices[symbol]?.change?.toFixed(2) || '0'}%
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderRightPanel() {
            const stats = calculateStats();
            const positionsContainer = document.getElementById('positionsContainer');
            const historyContainer = document.getElementById('historyContainer');
            const balanceEl = document.getElementById('balanceDisplay');
            
            if (balanceEl) balanceEl.innerText = `$${userData.balance.toFixed(2)}`;
            if (positionsContainer) {
                positionsContainer.innerHTML = userData.positions.length === 0 ? 
                    '<div style="text-align:center; color:#555; padding:20px;">No open positions</div>' :
                    userData.positions.map(pos => {
                        const current = marketPrices[pos.coin]?.price || pos.entryPrice;
                        const pnl = (current - pos.entryPrice) * pos.amount;
                        return `
                            <div class="position-item">
                                <div class="position-row">
                                    <span>${pos.coinName}</span>
                                    <span class="${pnl >= 0 ? 'positive' : 'negative'}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</span>
                                </div>
                                <div class="position-row" style="font-size:10px; color:#555;">
                                    <span>Entry: $${pos.entryPrice.toFixed(2)}</span>
                                    <span>Amt: ${pos.amount.toFixed(6)}</span>
                                </div>
                            </div>
                        `;
                    }).join('');
            }
            
            if (historyContainer) {
                historyContainer.innerHTML = userData.tradeHistory.length === 0 ?
                    '<div style="text-align:center; color:#555; padding:20px;">No trades yet</div>' :
                    userData.tradeHistory.slice(0, 10).map(trade => `
                        <div class="history-item">
                            <div class="history-row">
                                <span>${trade.coinName}</span>
                                <span class="${trade.pnl >= 0 ? 'positive' : 'negative'}">${trade.pnl >= 0 ? '+' : ''}$${trade.pnl.toFixed(2)}</span>
                            </div>
                            <div class="history-row" style="font-size:9px; color:#555;">
                                <span>Entry: $${trade.entryPrice?.toFixed(2)}</span>
                                <span>Exit: $${trade.exitPrice?.toFixed(2)}</span>
                            </div>
                        </div>
                    `).join('');
            }
            
            // Update stats
            document.getElementById('statTotalPnL').innerHTML = `${stats.totalPnL >= 0 ? '+' : ''}$${stats.totalPnL.toFixed(2)}`;
            document.getElementById('statWinRate').innerHTML = `${stats.winRate.toFixed(1)}%`;
            document.getElementById('statBestTrade').innerHTML = `+$${stats.bestTrade.toFixed(2)}`;
            document.getElementById('statWorstTrade').innerHTML = `$${stats.worstTrade.toFixed(2)}`;
            document.getElementById('statTotalTrades').innerHTML = stats.totalTrades;
        }
        
        // ============ SELECT COIN ============
        window.selectCoin = async (symbol) => {
            selectedCoin = symbol;
            selectedCoinName = symbol.replace('USDT', '');
            document.getElementById('currentSymbolDisplay').innerHTML = `${selectedCoinName}/USDT`;
            document.getElementById('executeBtn').innerHTML = `BUY ${selectedCoinName}`;
            await fetchChartData();
            renderWatchlist();
        };
        
        window.changeTimeframe = (tf) => {
            currentInterval = tf;
            document.querySelectorAll('.tf-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tf-btn[onclick="changeTimeframe('${tf}')"]`)?.classList.add('active');
            fetchChartData();
        };
        
        window.setTradeSide = (side) => {
            const buyTab = document.getElementById('buyTab');
            const sellTab = document.getElementById('sellTab');
            const execBtn = document.getElementById('executeBtn');
            
            if (side === 'buy') {
                buyTab.classList.add('active');
                sellTab.classList.remove('active');
                execBtn.className = 'execute-btn buy';
                execBtn.innerHTML = `BUY ${selectedCoinName}`;
                execBtn.onclick = () => executeTrade('buy');
            } else {
                sellTab.classList.add('active');
                buyTab.classList.remove('active');
                execBtn.className = 'execute-btn sell';
                execBtn.innerHTML = `SELL ${selectedCoinName}`;
                execBtn.onclick = () => executeTrade('sell');
            }
        };
        
        window.toggleIndicatorMenu = () => {
            document.getElementById('indicatorMenu')?.classList.toggle('show');
        };
        
        window.filterIndicators = () => {
            const search = document.getElementById('indicatorSearch')?.value.toLowerCase();
            document.querySelectorAll('.indicator-option').forEach(item => {
                item.style.display = item.textContent.toLowerCase().includes(search) ? 'block' : 'none';
            });
        };
        
        window.showLoginModal = () => {
            const modal = document.getElementById('loginModal');
            if (modal) modal.classList.add('show');
        };
        
        window.closeModal = (id) => {
            document.getElementById(id)?.classList.remove('show');
        };
        
        // ============ MAIN RENDER ============
        async function renderUI() {
            const stats = calculateStats();
            const app = document.getElementById('app');
            
            app.innerHTML = `
                <div class="top-bar">
                    <div>
                        <span class="logo">▲ ATHARVA CAPITAL</span>
                        <span class="logo-sub">by Atharva Darshanwar</span>
                    </div>
                    <div class="search-container">
                        <input type="text" class="search-input" id="searchInput" placeholder="Search 500+ coins... BTC, ETH, SOL..." autocomplete="off">
                        <div class="search-results" id="searchResults"></div>
                    </div>
                    <div class="user-info">
                        ${currentUser ? `
                            <span class="balance" id="balanceDisplay">$${userData.balance.toFixed(2)}</span>
                            <button class="topup-btn" onclick="topUpBalance()">+$1000</button>
                            <button class="auth-btn" onclick="logout()">Logout</button>
                        ` : `
                            <button class="auth-btn" onclick="showLoginModal()">Login</button>
                            <button class="auth-btn" onclick="signup(prompt('Email:'), prompt('Password:'))">Signup</button>
                        `}
                    </div>
                </div>
                
                <div class="main-layout">
                    <div class="left-panel">
                        <div class="panel-header"><h3>WATCHLIST</h3></div>
                        <div id="watchlistContainer"></div>
                    </div>
                    
                    <div class="center-panel">
                        <div class="chart-header">
                            <div>
                                <span class="current-symbol" id="currentSymbolDisplay">${selectedCoinName}/USDT</span>
                                <span class="current-price" id="currentPriceDisplay">$${currentPrice?.toLocaleString() || '—'}</span>
                                <span id="currentChangeDisplay" class="${currentChange24h >= 0 ? 'positive' : 'negative'}">${currentChange24h >= 0 ? '+' : ''}${currentChange24h?.toFixed(2) || '0'}%</span>
                            </div>
                            <div style="display:flex; gap:10px;">
                                <div class="timeframes">
                                    ${['1m','5m','15m','1h','4h','1D'].map(tf => `
                                        <button class="tf-btn ${currentInterval === tf ? 'active' : ''}" onclick="changeTimeframe('${tf}')">${tf}</button>
                                    `).join('')}
                                </div>
                                <div class="indicator-dropdown">
                                    <button class="indicator-btn" onclick="toggleIndicatorMenu()">📊 Indicators ▼</button>
                                    <div class="indicator-menu" id="indicatorMenu">
                                        <div class="indicator-search">
                                            <input type="text" id="indicatorSearch" placeholder="Search indicators..." onkeyup="filterIndicators()">
                                        </div>
                                        <div class="indicator-list" id="indicatorList">
                                            ${['RSI', 'MACD', 'EMA 9', 'EMA 20', 'EMA 50', 'Bollinger Bands', 'Volume', 'Stochastic', 'VWAP'].map(ind => `
                                                <div class="indicator-option" onclick="addIndicator('${ind}'); toggleIndicatorMenu();">${ind}</div>
                                            `).join('')}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="chart-container">
                            <div id="chart" style="width:100%; height:100%; min-height:450px;"></div>
                        </div>
                    </div>
                    
                    <div class="right-panel">
                        <div class="trade-tabs">
                            <button class="trade-tab active" id="buyTab" onclick="setTradeSide('buy')">BUY</button>
                            <button class="trade-tab sell" id="sellTab" onclick="setTradeSide('sell')">SELL</button>
                        </div>
                        
                        <div class="trade-form">
                            <div class="input-group">
                                <label>Amount (${selectedCoinName})</label>
                                <input type="number" id="tradeAmount" placeholder="0.00">
                            </div>
                            <div class="input-group">
                                <label>Stop Loss (Optional)</label>
                                <input type="number" id="stopLoss" placeholder="0.00">
                            </div>
                            <div class="input-group">
                                <label>Take Profit (Optional)</label>
                                <input type="number" id="takeProfit" placeholder="0.00">
                            </div>
                            <button class="execute-btn buy" id="executeBtn" onclick="executeTrade('buy')">BUY ${selectedCoinName}</button>
                        </div>
                        
                        <div class="stats-grid">
                            <div class="stat-card"><div class="stat-label">Total P&L</div><div class="stat-value" id="statTotalPnL">${stats.totalPnL >= 0 ? '+' : ''}$${stats.totalPnL.toFixed(2)}</div></div>
                            <div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-value" id="statWinRate">${stats.winRate.toFixed(1)}%</div></div>
                            <div class="stat-card"><div class="stat-label">Best Trade</div><div class="stat-value positive" id="statBestTrade">+$${stats.bestTrade.toFixed(2)}</div></div>
                            <div class="stat-card"><div class="stat-label">Worst Trade</div><div class="stat-value negative" id="statWorstTrade">$${stats.worstTrade.toFixed(2)}</div></div>
                            <div class="stat-card"><div class="stat-label">Total Trades</div><div class="stat-value" id="statTotalTrades">${stats.totalTrades}</div></div>
                        </div>
                        
                        <div class="section">
                            <div class="section-title">OPEN POSITIONS (${userData.positions.length})</div>
                            <div id="positionsContainer"></div>
                        </div>
                        
                        <div class="section">
                            <div class="section-title">TRADE HISTORY</div>
                            <div id="historyContainer"></div>
                        </div>
                    </div>
                </div>
                
                <div class="status-bar">
                    <div><span class="live-dot"></span> Binance Live Data • Real-time</div>
                    <div>ATHARVA CAPITAL v3.0 | ${currentUser ? currentUser.email : 'Not logged in'}</div>
                    <div>500+ Coins | Candlestick Chart | Indicators</div>
                </div>
                
                <div class="modal" id="emotionModal">
                    <div class="modal-content">
                        <h3>🤔 How did you feel?</h3>
                        <div class="emotion-buttons">
                            <button class="emotion-btn" onclick="submitEmotion('Fear')">😨 Fear</button>
                            <button class="emotion-btn" onclick="submitEmotion('Greed')">🤑 Greed</button>
                            <button class="emotion-btn" onclick="submitEmotion('FOMO')">😍 FOMO</button>
                            <button class="emotion-btn" onclick="submitEmotion('Confident')">😎 Confident</button>
                            <button class="emotion-btn" onclick="submitEmotion('Calm')">😌 Calm</button>
                            <button class="emotion-btn" onclick="submitEmotion('Revenge')">😤 Revenge</button>
                        </div>
                        <button class="execute-btn buy" onclick="closeModal('emotionModal')" style="margin-top:10px;">Close</button>
                    </div>
                </div>
                
                <div class="modal" id="loginModal">
                    <div class="modal-content">
                        <h3>Login</h3>
                        <div class="input-group"><input type="email" id="loginEmail" placeholder="Email"></div>
                        <div class="input-group"><input type="password" id="loginPassword" placeholder="Password"></div>
                        <button class="execute-btn buy" onclick="login(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); closeModal('loginModal')">Login</button>
                        <button class="auth-btn" onclick="closeModal('loginModal')" style="margin-top:10px; width:100%;">Cancel</button>
                    </div>
                </div>
            `;
            
            // Initialize chart after DOM is ready
            setTimeout(async () => {
                await initChart();
                renderWatchlist();
                renderRightPanel();
                updatePriceDisplay();
            }, 500);
            
            // Setup search
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const query = e.target.value;
                    if (query.length < 2) {
                        searchResults.classList.remove('show');
                        return;
                    }
                    const results = searchCoins(query);
                    if (results.length > 0) {
                        searchResults.innerHTML = results.map(coin => `
                            <div class="search-result-item" onclick="selectCoin('${coin.symbol}'); document.getElementById('searchResults').classList.remove('show'); document.getElementById('searchInput').value = '';">
                                <strong>${coin.symbol.replace('USDT', '')}</strong>
                                <span style="color:#666; font-size:11px;"> ${coin.symbol}</span>
                            </div>
                        `).join('');
                        searchResults.classList.add('show');
                    } else {
                        searchResults.innerHTML = '<div class="search-result-item">No results found</div>';
                        searchResults.classList.add('show');
                    }
                });
                
                document.addEventListener('click', (e) => {
                    if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                        searchResults.classList.remove('show');
                    }
                });
            }
        }
        
        // ============ INIT ============
        async function init() {
            await loadAllCoins();
            await fetchPrices();
            setInterval(fetchPrices, 5000);
            renderUI();
            
            if (auth) {
                auth.onAuthStateChanged(async (user) => {
                    currentUser = user;
                    if (user) {
                        await loadUserData(user.uid);
                    } else {
                        userData = { balance: 10000, positions: [], tradeHistory: [], emotions: [] };
                    }
                    renderUI();
                });
            }
        }
        
        // Load Lightweight Charts library dynamically
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.js';
        script.onload = () => {
            console.log('Lightweight Charts loaded');
            init();
        };
        document.head.appendChild(script);
    </script>
</body>
</html>
