<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atharva Capital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        .logo {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }
        .logo span {
            background: linear-gradient(135deg, #ffffff, #888888);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .tagline {
            color: #666;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }
        .status {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 20px 40px;
            display: inline-block;
        }
        .status h2 {
            color: #00ff88;
            margin-bottom: 10px;
        }
        .status p {
            color: #888;
        }
        .dev {
            margin-top: 40px;
            color: #333;
            font-size: 12px;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 2px solid #1a1a1a;
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto 0;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span>▲</span> ATHARVA <span>CAPITAL</span>
        </div>
        <div class="tagline">by Atharva Darshanwar</div>
        <div class="status">
            <h2>🚀 COMING SOON</h2>
            <p>Crypto Trading Simulator is launching...</p>
            <div class="loader"></div>
        </div>
        <div class="dev">
            Professional Crypto Trading Terminal | Real-time Data | Virtual Trading
        </div>
    </div>
</body>
</html>
