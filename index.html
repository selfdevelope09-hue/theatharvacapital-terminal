<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Atharva Capital | Crypto Trading Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', monospace;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: #050505;
            border-bottom: 1px solid #1a1a1a;
            height: 64px;
        }

        .logo-section {
            display: flex;
            flex-direction: column;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .logo-icon {
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .logo-sub {
            font-size: 10px;
            color: #555;
        }

        .tagline {
            font-size: 8px;
            color: #333;
        }

        .market-summary {
            display: flex;
            gap: 32px;
        }

        .market-item {
            display: flex;
            gap: 8px;
            align-items: baseline;
            font-size: 14px;
        }

        .market-symbol {
            color: #666;
        }

        .market-price {
            font-family: monospace;
            font-weight: 600;
        }

        .market-change.positive {
            color: #00ff88;
        }

        .market-change.negative {
            color: #ff3355;
        }

        .portfolio-summary {
            display: flex;
            gap: 24px;
        }

        .portfolio-item {
            text-align: right;
        }

        .portfolio-label {
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
        }

        .portfolio-value {
            font-size: 16px;
            font-weight: 600;
            font-family: monospace;
        }

        .portfolio-item.positive .portfolio-value {
            color: #00ff88;
        }

        .portfolio-item.negative .portfolio-value {
            color: #ff3355;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #333, #111);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            border: 1px solid #333;
        }

        /* Main Layout */
        .main-layout {
            display: flex;
            flex: 1;
            height: calc(100vh - 96px);
            gap: 1px;
            background: #1a1a1a;
        }

        /* Watchlist */
        .watchlist {
            width: 280px;
            background: #000000;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .watchlist-header {
            padding: 16px;
            border-bottom: 1px solid #1a1a1a;
        }

        .watchlist-header h3 {
            font-size: 11px;
            color: #555;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .search-box {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            padding: 8px 12px;
            width: 100%;
            color: #fff;
            font-size: 13px;
        }

        .watchlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #0a0a0a;
            transition: all 0.2s;
        }

        .watchlist-item:hover {
            background: #0a0a0a;
        }

        .watchlist-item.active {
            background: #111111;
            border-left: 2px solid #fff;
        }

        .coin-symbol {
            font-weight: 600;
            font-size: 14px;
        }

        .coin-name {
            font-size: 10px;
            color: #555;
        }

        .price {
            font-family: monospace;
            font-size: 13px;
        }

        .change {
            font-size: 10px;
            display: block;
            text-align: right;
        }

        .change.positive {
            color: #00ff88;
        }

        .change.negative {
            color: #ff3355;
        }

        /* Chart Panel */
        .chart-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000000;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid #1a1a1a;
        }

        .coin-title h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .current-price {
            font-size: 24px;
            font-weight: 600;
            font-family: monospace;
            margin-left: 16px;
        }

        .chart-timeframes {
            display: flex;
            gap: 6px;
        }

        .timeframe-btn {
            background: transparent;
            border: 1px solid #1a1a1a;
            color: #888;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
        }

        .timeframe-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .chart-container {
            flex: 1;
            min-height: 0;
            padding: 10px;
        }

        canvas {
            width: 100%;
            height: 100%;
            background: #000000;
        }

        /* Trading Panel */
        .trading-panel {
            width: 320px;
            background: #000000;
            border-left: 1px solid #1a1a1a;
            overflow-y: auto;
        }

        .trading-header {
            display: flex;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid #1a1a1a;
        }

        .topup-btn {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            color: #00ff88;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .side-buttons {
            display: flex;
            gap: 8px;
            padding: 12px;
        }

        .side-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .side-btn.buy {
            background: #0a1a0a;
            color: #00ff88;
            border: 1px solid #1a3a1a;
        }

        .side-btn.buy.active {
            background: #00ff88;
            color: #000;
        }

        .side-btn.sell {
            background: #1a0a0a;
            color: #ff3355;
            border: 1px solid #3a1a1a;
        }

        .side-btn.sell.active {
            background: #ff3355;
            color: #fff;
        }

        .trade-inputs {
            padding: 12px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            font-size: 10px;
            color: #666;
            display: block;
            margin-bottom: 4px;
        }

        .input-group input {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            padding: 10px;
            color: #fff;
            font-family: monospace;
        }

        .execute-btn {
            width: calc(100% - 24px);
            margin: 12px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
        }

        .execute-btn.buy {
            background: #00ff88;
            color: #000;
        }

        .execute-btn.sell {
            background: #ff3355;
            color: #fff;
        }

        .positions-list, .order-history {
            padding: 12px;
            border-top: 1px solid #1a1a1a;
            margin-top: 12px;
        }

        .section-header h4 {
            font-size: 10px;
            color: #666;
            margin-bottom: 8px;
        }

        .position-item, .order-item {
            background: #0a0a0a;
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 6px;
        }

        .position-header, .order-header {
            display: flex;
            justify-content: space-between;
        }

        .position-pnl.positive, .order-pnl.positive {
            color: #00ff88;
        }

        .position-pnl.negative, .order-pnl.negative {
            color: #ff3355;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 6px 20px;
            background: #050505;
            border-top: 1px solid #1a1a1a;
            font-size: 10px;
            color: #555;
            height: 32px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .status-right {
            font-family: monospace;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
        }

        .emotion-buttons {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .emotion-btn {
            background: #111;
            border: 1px solid #1a1a1a;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .emotion-btn.selected {
            background: #00ff88;
            color: #000;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ---------- STATE ----------
        let selectedCoin = 'BTCUSDT';
        let virtualBalance = 10000;
        let positions = [];
        let tradeHistory = [];
        let marketData = {};
        let chart = null;
        let candlestickSeries = null;
        let showEmotionModal = false;
        let lastTrade = null;

        const COINS = [
            { symbol: 'BTCUSDT', name: 'Bitcoin' },
            { symbol: 'ETHUSDT', name: 'Ethereum' },
            { symbol: 'SOLUSDT', name: 'Solana' },
            { symbol: 'BNBUSDT', name: 'Binance Coin' },
            { symbol: 'XRPUSDT', name: 'Ripple' },
            { symbol: 'DOGEUSDT', name: 'Dogecoin' },
            { symbol: 'ADAUSDT', name: 'Cardano' },
        ];

        // ---------- LOAD SAVED DATA ----------
        function loadSavedData() {
            const savedBalance = localStorage.getItem('virtualBalance');
            const savedPositions = localStorage.getItem('positions');
            const savedTradeHistory = localStorage.getItem('tradeHistory');
            
            if (savedBalance) virtualBalance = parseFloat(savedBalance);
            if (savedPositions) positions = JSON.parse(savedPositions);
            if (savedTradeHistory) tradeHistory = JSON.parse(savedTradeHistory);
        }

        function saveData() {
            localStorage.setItem('virtualBalance', virtualBalance);
            localStorage.setItem('positions', JSON.stringify(positions));
            localStorage.setItem('tradeHistory', JSON.stringify(tradeHistory));
        }

        // ---------- FETCH PRICES ----------
        async function fetchPrices() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const data = await response.json();
                
                COINS.forEach(coin => {
                    const coinData = data.find(d => d.symbol === coin.symbol);
                    if (coinData) {
                        marketData[coin.symbol] = {
                            price: parseFloat(coinData.lastPrice),
                            change24h: parseFloat(coinData.priceChangePercent),
                            high: parseFloat(coinData.highPrice),
                            low: parseFloat(coinData.lowPrice),
                        };
                    }
                });
                
                render();
            } catch (error) {
                console.error('Error fetching prices:', error);
            }
        }

        // ---------- FETCH CHART DATA ----------
        async function fetchChartData() {
            try {
                const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${selectedCoin}&interval=1h&limit=100`);
                const data = await response.json();
                
                const candleData = data.map(kline => ({
                    time: kline[0] / 1000,
                    open: parseFloat(kline[1]),
                    high: parseFloat(kline[2]),
                    low: parseFloat(kline[3]),
                    close: parseFloat(kline[4]),
                }));
                
                if (candlestickSeries) {
                    candlestickSeries.setData(candleData);
                }
            } catch (error) {
                console.error('Error fetching chart:', error);
            }
        }

        // ---------- EXECUTE TRADE ----------
        function executeTrade(side) {
            const amountInput = document.getElementById('tradeAmount');
            const amount = parseFloat(amountInput?.value || 0);
            const currentPrice = marketData[selectedCoin]?.price || 0;
            
            if (!amount || amount <= 0) {
                alert('Please enter valid amount');
                return;
            }
            
            const totalCost = amount * currentPrice;
            
            if (side === 'buy') {
                if (totalCost > virtualBalance) {
                    alert('Insufficient balance! Use +Add Funds');
                    return;
                }
                
                positions.push({
                    id: Date.now(),
                    coin: selectedCoin,
                    amount: amount,
                    entryPrice: currentPrice,
                    timestamp: new Date().toISOString(),
                });
                virtualBalance -= totalCost;
                lastTrade = { side: 'buy', amount, price: currentPrice, coin: selectedCoin };
            } else {
                const position = positions.find(p => p.coin === selectedCoin);
                if (!position) {
                    alert('No position to sell');
                    return;
                }
                
                const pnl = (currentPrice - position.entryPrice) * position.amount;
                tradeHistory.unshift({
                    id: Date.now(),
                    coin: selectedCoin,
                    entryPrice: position.entryPrice,
                    exitPrice: currentPrice,
                    amount: position.amount,
                    pnl: pnl,
                    timestamp: new Date().toISOString(),
                });
                virtualBalance += position.amount * currentPrice;
                positions = positions.filter(p => p.id !== position.id);
                lastTrade = { side: 'sell', amount: position.amount, price: currentPrice, pnl, coin: selectedCoin };
            }
            
            saveData();
            if (amountInput) amountInput.value = '';
            showEmotionModal = true;
            render();
        }

        function topUpBalance() {
            virtualBalance += 1000;
            saveData();
            render();
        }

        function closeEmotionModal(emotion) {
            if (emotion) {
                const emotions = JSON.parse(localStorage.getItem('emotionTracking') || '[]');
                emotions.push({ trade: lastTrade, emotion, timestamp: new Date().toISOString() });
                localStorage.setItem('emotionTracking', JSON.stringify(emotions));
            }
            showEmotionModal = false;
            render();
        }

        // ---------- RENDER UI ----------
        function render() {
            const app = document.getElementById('app');
            if (!app) return;
            
            const currentPrice = marketData[selectedCoin]?.price || 0;
            const totalValue = virtualBalance + positions.reduce((sum, p) => sum + (p.amount * (marketData[p.coin]?.price || p.entryPrice)), 0);
            const totalPnL = positions.reduce((sum, p) => {
                const current = marketData[p.coin]?.price || p.entryPrice;
                return sum + ((current - p.entryPrice) * p.amount);
            }, 0);
            
            app.innerHTML = `
                <div style="height:100vh; display:flex; flex-direction:column; background:#000;">
                    <!-- Top Bar -->
                    <div class="top-bar">
                        <div class="logo-section">
                            <div class="logo">
                                <span class="logo-icon">▲</span>
                                <span class="logo-text">ATHARVA</span>
                                <span class="logo-sub">CAPITAL</span>
                            </div>
                            <div class="tagline">by Atharva Darshanwar</div>
                        </div>
                        <div class="market-summary">
                            <div class="market-item">
                                <span class="market-symbol">BTC</span>
                                <span class="market-price">$${marketData['BTCUSDT']?.price?.toLocaleString() || '—'}</span>
                                <span class="market-change ${marketData['BTCUSDT']?.change24h >= 0 ? 'positive' : 'negative'}">
                                    ${marketData['BTCUSDT']?.change24h?.toFixed(2) || '0'}%
                                </span>
                            </div>
                            <div class="market-item">
                                <span class="market-symbol">ETH</span>
                                <span class="market-price">$${marketData['ETHUSDT']?.price?.toLocaleString() || '—'}</span>
                                <span class="market-change ${marketData['ETHUSDT']?.change24h >= 0 ? 'positive' : 'negative'}">
                                    ${marketData['ETHUSDT']?.change24h?.toFixed(2) || '0'}%
                                </span>
                            </div>
                        </div>
                        <div class="portfolio-summary">
                            <div class="portfolio-item">
                                <div class="portfolio-label">TOTAL VALUE</div>
                                <div class="portfolio-value">$${totalValue.toFixed(2)}</div>
                            </div>
                            <div class="portfolio-item">
                                <div class="portfolio-label">AVAILABLE</div>
                                <div class="portfolio-value">$${virtualBalance.toFixed(2)}</div>
                            </div>
                            <div class="portfolio-item ${totalPnL >= 0 ? 'positive' : 'negative'}">
                                <div class="portfolio-label">TOTAL P&L</div>
                                <div class="portfolio-value">${totalPnL >= 0 ? '+' : ''}$${totalPnL.toFixed(2)}</div>
                            </div>
                        </div>
                        <div class="user-profile">
                            <div class="avatar">AD</div>
                            <span>Atharva</span>
                        </div>
                    </div>
                    
                    <!-- Main Layout -->
                    <div class="main-layout">
                        <!-- Watchlist -->
                        <div class="watchlist">
                            <div class="watchlist-header">
                                <h3>MARKETS</h3>
                                <input type="text" class="search-box" placeholder="Search coins..." id="searchBox">
                            </div>
                            <div id="watchlistItems">
                                ${COINS.map(coin => {
                                    const data = marketData[coin.symbol];
                                    return `
                                        <div class="watchlist-item ${selectedCoin === coin.symbol ? 'active' : ''}" data-coin="${coin.symbol}">
                                            <div>
                                                <div class="coin-symbol">${coin.symbol.replace('USDT', '')}</div>
                                                <div class="coin-name">${coin.name}</div>
                                            </div>
                                            <div>
                                                <div class="price">$${data?.price?.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) || '—'}</div>
                                                <div class="change ${data?.change24h >= 0 ? 'positive' : 'negative'}">
                                                    ${data?.change24h >= 0 ? '+' : ''}${data?.change24h?.toFixed(2) || '0'}%
                                                </div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                        
                        <!-- Chart Panel -->
                        <div class="chart-panel">
                            <div class="chart-header">
                                <div class="coin-title">
                                    <h1>${selectedCoin.replace('USDT', '')}/USDT</h1>
                                    <span class="current-price">$${currentPrice.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</span>
                                </div>
                                <div class="chart-timeframes">
                                    ${['1m','5m','15m','1h','4h','1D'].map(tf => `<button class="timeframe-btn" data-tf="${tf}">${tf}</button>`).join('')}
                                </div>
                            </div>
                            <div class="chart-container">
                                <canvas id="chartCanvas" style="width:100%; height:100%; background:#000;"></canvas>
                            </div>
                        </div>
                        
                        <!-- Trading Panel -->
                        <div class="trading-panel">
                            <div class="trading-header">
                                <h3 style="color:#666;">TRADE</h3>
                                <button class="topup-btn" id="topupBtn">+ Add Funds</button>
                            </div>
                            <div class="side-buttons">
                                <button class="side-btn buy active" id="buyTab">BUY</button>
                                <button class="side-btn sell" id="sellTab">SELL</button>
                            </div>
                            <div class="trade-inputs">
                                <div class="input-group">
                                    <label>Amount (${selectedCoin.replace('USDT', '')})</label>
                                    <input type="number" id="tradeAmount" placeholder="Enter amount">
                                </div>
                            </div>
                            <button class="execute-btn buy" id="executeBtn">BUY ${selectedCoin.replace('USDT', '')}</button>
                            
                            <div class="positions-list">
                                <div class="section-header"><h4>OPEN POSITIONS</h4></div>
                                ${positions.length === 0 ? '<div style="color:#333; text-align:center; padding:10px;">No open positions</div>' : 
                                    positions.map(pos => {
                                        const current = marketData[pos.coin]?.price || pos.entryPrice;
                                        const pnl = (current - pos.entryPrice) * pos.amount;
                                        return `
                                            <div class="position-item">
                                                <div class="position-header">
                                                    <span>${pos.coin.replace('USDT', '')}</span>
                                                    <span class="position-pnl ${pnl >= 0 ? 'positive' : 'negative'}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</span>
                                                </div>
                                                <div style="font-size:10px; color:#555;">Entry: $${pos.entryPrice.toFixed(2)} | Amount: ${pos.amount.toFixed(6)}</div>
                                            </div>
                                        `;
                                    }).join('')
                                }
                            </div>
                            
                            <div class="order-history">
                                <div class="section-header"><h4>RECENT TRADES</h4></div>
                                ${tradeHistory.length === 0 ? '<div style="color:#333; text-align:center; padding:10px;">No trades yet</div>' :
                                    tradeHistory.slice(0,5).map(trade => `
                                        <div class="order-item">
                                            <div class="order-header">
                                                <span>${trade.coin.replace('USDT', '')}</span>
                                                <span class="order-pnl ${trade.pnl >= 0 ? 'positive' : 'negative'}">${trade.pnl >= 0 ? '+' : ''}$${trade.pnl?.toFixed(2)}</span>
                                            </div>
                                            <div style="font-size:9px; color:#555;">Entry: $${trade.entryPrice?.toFixed(2)} | Exit: $${trade.exitPrice?.toFixed(2)}</div>
                                        </div>
                                    `).join('')
                                }
                            </div>
                        </div>
                    </div>
                    
                    <!-- Status Bar -->
                    <div class="status-bar">
                        <div><span class="status-dot"></span> Binance WebSocket • LIVE DATA</div>
                        <div>ATHARVA CAPITAL v1.0</div>
                        <div class="status-right">by Atharva Darshanwar</div>
                    </div>
                </div>
                
                ${showEmotionModal ? `
                    <div class="modal-overlay">
                        <div class="modal">
                            <h3>🤔 How did you feel during this trade?</h3>
                            <div class="emotion-buttons">
                                <button class="emotion-btn" data-emotion="Fear">😨 Fear</button>
                                <button class="emotion-btn" data-emotion="Greed">🤑 Greed</button>
                                <button class="emotion-btn" data-emotion="FOMO">😍 FOMO</button>
                                <button class="emotion-btn" data-emotion="Confident">😎 Confident</button>
                                <button class="emotion-btn" data-emotion="Calm">😌 Calm</button>
                                <button class="emotion-btn" data-emotion="Revenge">😤 Revenge</button>
                            </div>
                            <button id="skipEmotion" style="width:100%; background:#1a1a1a; color:#fff; border:none; padding:10px; border-radius:8px;">Skip</button>
                        </div>
                    </div>
                ` : ''}
            `;
            
            // Attach events
            document.querySelectorAll('.watchlist-item').forEach(el => {
                el.addEventListener('click', () => {
                    selectedCoin = el.dataset.coin;
                    fetchChartData();
                    render();
                });
            });
            
            document.getElementById('topupBtn')?.addEventListener('click', topUpBalance);
            document.getElementById('executeBtn')?.addEventListener('click', () => {
                const isBuy = document.getElementById('buyTab')?.classList.contains('active');
                executeTrade(isBuy ? 'buy' : 'sell');
            });
            
            document.getElementById('buyTab')?.addEventListener('click', () => {
                document.getElementById('buyTab')?.classList.add('active');
                document.getElementById('sellTab')?.classList.remove('active');
                document.getElementById('executeBtn')?.classList.remove('sell');
                document.getElementById('executeBtn')?.classList.add('buy');
                document.getElementById('executeBtn').innerText = `BUY ${selectedCoin.replace('USDT', '')}`;
            });
            
            document.getElementById('sellTab')?.addEventListener('click', () => {
                document.getElementById('sellTab')?.classList.add('active');
                document.getElementById('buyTab')?.classList.remove('active');
                document.getElementById('executeBtn')?.classList.remove('buy');
                document.getElementById('executeBtn')?.classList.add('sell');
                document.getElementById('executeBtn').innerText = `SELL ${selectedCoin.replace('USDT', '')}`;
            });
            
            document.querySelectorAll('.emotion-btn').forEach(btn => {
                btn.addEventListener('click', () => closeEmotionModal(btn.dataset.emotion));
            });
            document.getElementById('skipEmotion')?.addEventListener('click', () => closeEmotionModal(null));
            
            document.querySelectorAll('.timeframe-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    fetchChartData();
                });
            });
            
            // Simple canvas chart
            if (candlestickSeries && typeof LightweightCharts !== 'undefined') {
                // Chart already exists
            }
        }
        
        // Initialize
        loadSavedData();
        fetchPrices();
        setInterval(fetchPrices, 10000);
        fetchChartData();
        setInterval(fetchChartData, 60000);
        render();
        
        // Load lightweight charts library
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.js';
        script.onload = () => {
            const chartContainer = document.getElementById('chartCanvas')?.parentElement;
            if (chartContainer && typeof LightweightCharts !== 'undefined') {
                chart = LightweightCharts.createChart(chartContainer, {
                    layout: { background: { color: '#000000' }, textColor: '#888' },
                    grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
                    width: chartContainer.clientWidth,
                    height: 400,
                });
                candlestickSeries = chart.addCandlestickSeries({
                    upColor: '#00ff88', downColor: '#ff3355',
                    borderUpColor: '#00ff88', borderDownColor: '#ff3355',
                });
                fetchChartData();
            }
        };
        document.head.appendChild(script);
    </script>
</body>
</html>
